<div class="bg-gradient-to-b from-yellow-200 to-purple-300 rounded-lg shadow-lg max-w-md mx-auto">
    <!-- Image Section -->
    <div class="relative">
        <img src="https://via.placeholder.com/400x200" alt="Course Image" class="w-full rounded-t-lg" />
    </div>

    <!-- Enrollment Section -->
    <div class="bg-white p-6 rounded-b-lg">
        <!-- Status -->
        <div class="text-center">
            <p class="text-gray-600 text-lg mb-4">Not Enrolled</p>
            <button class="bg-blue-600 text-white text-lg px-6 py-2 rounded-lg hover:bg-blue-700">
                Login to Enroll
            </button>
            <p class="text-blue-500 mt-2">Free</p>
        </div>

        <!-- Course Details -->
        <div class="mt-6">
            <h3 class="text-xl font-semibold mb-4">Course Includes</h3>
            <ul class="space-y-4">
                <li class="flex items-center">
                    <span class="text-gray-600 mr-3">📖</span>
                    <span>6 Modules</span>
                </li>
                <li class="flex items-center">
                    <span class="text-gray-600 mr-3">📋</span>
                    <span>26 Topics</span>
                </li>
                <li class="flex items-center">
                    <span class="text-gray-600 mr-3">❓</span>
                    <span>1 Quiz</span>
                </li>
            </ul>
        </div>
    </div>
</div>
